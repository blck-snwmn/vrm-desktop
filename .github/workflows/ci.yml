name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install --frozen-lockfile
      - run: bun build --target=node apps/electron/src/main.ts --outdir /tmp/vrm-desktop-electron-main-build
      - run: bun build --target=node apps/electron/src/preload.ts --outdir /tmp/vrm-desktop-electron-preload-build
      - run: bun build --target=browser apps/electron/src/renderer.ts --outdir /tmp/vrm-desktop-electron-renderer-build
